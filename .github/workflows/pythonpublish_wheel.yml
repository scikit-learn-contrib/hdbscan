name: Upload Python Wheels

on:
  workflow_dispatch:
    inputs:
      checkout_ref:
        description: "The branch, tag or SHA to checkout."
        required: true
        default: "master"

jobs:
  linux-deploy:
    runs-on: ubuntu-latest
    container: quay.io/pypa/manylinux_2_28_x86_64
    strategy:
      fail-fast: false
      matrix:
        python:
          - "cp310-cp310"
          - "cp311-cp311"
          - "cp312-cp312"
          - "cp313-cp313"
          - "cp314-cp314"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref }}
      - name: Build wheel
        env:
          PYTHON: /opt/python/${{ matrix.python }}/bin/python
        run: |
          $PYTHON -m pip install --upgrade setuptools wheel build "cython>=3.0.11,<4" "numpy>=2.0"
          $PYTHON -m build --no-isolation
          auditwheel repair dist/*linux_x86_64.whl
      - name: Publish to pypi
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
        run: |
          pipx install twine
          twine upload dist/*.tar.gz --skip-existing
          twine upload wheelhouse/*.whl --skip-existing
  other-deploy:
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        os: [windows-2022, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          allow-prereleases: true
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools build wheel twine
          pip install "cython>=3.0.11,<4" "numpy>=2.0"
      - name: Build wheel
        run: |
          python -m build --no-isolation
      - name: Publish to pypi
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
        run: |
          twine upload dist/*.whl --skip-existing
